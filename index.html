<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Agbalumo&family=Chewy&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Delius&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Leckerli+One&family=Miranda+Sans:ital,wght@0,400..700;1,400..700&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Pacifico&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Vườn hoa gửi tặng Đặng Thu Huyền</title>
</head>
<body>
    <div id="container"> 
        <div id="content"><span class="nowrap">🌺 Vì Huyền,</span> <span class="nowrap">thế giới này</span> <span class="nowrap">sẽ nở hoa 🌺</span></div>
        <button id="btn">
            <i class="fas fa-check"></i>
        </button>
    </div>
    <div class="select-container">
        <div class="select-btn">🌙</div>     
        <div class="size-select">
            <div class="select-selected">Sẽ là những bông hoa: Muôn vẻ</div>
            <div class="select-items">
                <div data-value="random">Muôn vẻ</div>
                <div data-value="XS">Bé xíu</div>
                <div data-value="S">Nhỏ nhắn</div>
                <div data-value="M">Tiêu chuẩn</div>
                <div data-value="L">Hơi bự</div>
                <div data-value="XL">Khổng lồ</div>
                <div data-value="XXL">Siêu khổng lồ</div>           
            </div>
        </div>
    </div>
    <div class="mix-container">
        <div class="mix-btn">✨</div>
        <div class="mix-select">
            <div class="mix-mixed">Vườn hoa: Song sắc</div>
            <div class="mix-items">
                <div data-value="mix">Song sắc</div>
                <div data-value="pink">Tulip hồng</div>
                <div data-value="ivory">Tulip kem</div>          
            </div>
        </div>
    </div>
    <img src="sun_no1.png" alt="sun" id="sun" height="5px" >



    <canvas id="canva1"></canvas>
    <script src="main.js"></script>
</body>
</html>
